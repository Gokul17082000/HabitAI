spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/habitai?prepareThreshold=0}
    username: ${DB_USERNAME:gokulbj}
    password: ${DB_PASSWORD:}
    hikari:
      minimum-idle: 1
      maximum-pool-size: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 120000
      connection-test-query: SELECT 1
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  main:
    lazy-initialization: true

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}

cors:
  allowed-origins:
    - ${CORS_ORIGIN_1:http://localhost:8081}
    - ${CORS_ORIGIN_2:http://192.168.1.2:8081}
    - ${CORS_ORIGIN_3:http://192.168.1.2:19006}

firebase:
  service-account: ${FIREBASE_SERVICE_ACCOUNT:src/main/resources/firebase-service-account.json}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}