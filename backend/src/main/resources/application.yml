spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/habitai?prepareThreshold=0}
    username: ${DB_USERNAME:gokulbj}
    password: ${DB_PASSWORD:}
    hikari:
      minimum-idle: 1
      maximum-pool-size: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 120000
      connection-test-query: SELECT 1
  jpa:
    hibernate:
      # FIXED: was "update" — Hibernate should never auto-alter a production schema.
      # Use "validate" so the app fails fast on a schema mismatch rather than silently mutating the DB.
      # Run Flyway migrations explicitly to evolve the schema.
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: false
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  main:
    lazy-initialization: true
  flyway:
    enabled: true
    locations: classpath:db/migration

security:
  jwt:
    secret: ${JWT_SECRET}
    # Access token TTL — default 15 minutes (900000 ms). Set via JWT_EXPIRATION env var.
    expiration: ${JWT_EXPIRATION:900000}
    # Refresh token TTL — default 7 days (604800000 ms). Set via JWT_REFRESH_EXPIRATION env var.
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

cors:
  allowed-origins:
    - ${CORS_ORIGIN_1:http://localhost:8081}
    - ${CORS_ORIGIN_2:http://localhost:19006}
    # FIXED: removed hardcoded 192.168.1.2 — set CORS_ORIGIN_3 in your local .env instead:
    #   CORS_ORIGIN_3=http://192.168.x.x:8081
    - ${CORS_ORIGIN_3:}

# Trusted reverse-proxy IPs that are allowed to set X-Forwarded-For.
# Leave empty when running locally without a proxy (safe default — header is ignored).
# In production, set to your nginx / load balancer's internal IP:
#   rate-limit:
#     trusted-proxies:
#       - 10.0.0.1
rate-limit:
  trusted-proxies: ${RATE_LIMIT_TRUSTED_PROXIES:}

firebase:
  service-account: ${FIREBASE_SERVICE_ACCOUNT:src/main/resources/firebase-service-account.json}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}

groq:
  api:
    key: ${GROQ_API_KEY}
    url: https://api.groq.com/openai/v1/chat/completions